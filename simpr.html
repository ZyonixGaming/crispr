<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>SIMPR Horsey Genome Editor</title>
    <link rel="stylesheet" href="crispr.css">
    <link rel="stylesheet" href="headers.css">
    <!-- Override styles for custom dropdowns and layout -->
    <link rel="stylesheet" href="simpr.css">
</head>
<body>
    <!-- ====== HEADER BAR (unchanged) ====== -->
    <header class="header-bar">
        <div class="header-title">
            <span>🧬</span> SIMPR Horsey Genome Editor
        </div>
        <div class="tools-dropdown" id="toolsDropdown">
            <button class="tools-btn" id="toolsBtn">
                🔧 Tools <span class="arrow">▼</span>
            </button>
            <div class="dropdown-menu" id="dropdownMenu">
                <!-- Populated by headers.js -->
            </div>
        </div>
    </header>

    <div class="app-layout">
        <!-- ====== LEFT SIDEBAR ====== -->
        <div class="left-sidebar">
            <!-- PASTE / COPY -->
            <div class="controls-section">
                <div class="btn-group">
                    <button id="pasteBtn" class="primary">PASTE</button>
                    <button id="exportBtn" class="success">COPY</button>
                </div>
            </div>

            <!-- GENE DATA TEXTAREA -->
            <div class="textarea-section">
                <label>✏️ GENE DATA (To edit)</label>
                <div class="textarea-with-clear">
                    <textarea id="rawGeneInput" rows="14" placeholder='Example:
0:ATATGGCTTC
0:CTATGGACTC
1:TATAGCAACCTCA
1:TATAGCAACCTCA'></textarea>
                    <span class="textarea-actions">
                        <a id="dnaShortenerLink" href="#" target="_self">To DNA Shortener</a>
                        <button id="clearRawBtn" class="clear-btn clear-textarea-btn">✖ Clear</button>
                    </span>
                </div>
            </div>

            <!-- GO TO HELIX (moved from right sidebar) -->
            <div class="helix-nav" style="padding:16px; border-bottom:1px solid #2d3a46;">
                <h3>📑 GO TO HELIX (0–19)</h3>
                <div class="helix-buttons" id="helixNavButtons"></div>
            </div>

            <!-- Hidden dummy elements for removed features (to avoid JS errors) -->
            <div style="display:none">
                <button id="toggleCompareBtn"></button>
                <textarea id="compareGeneInput"></textarea>
                <button id="clearCompareBtn"></button>
                <button id="removeDiversityBtn"></button>
                <button id="randomDiversityBtn"></button>
            </div>
        </div>

        <!-- ====== MAIN TABLE AREA ====== -->
        <div class="main-content" id="mainContent">
            <div class="filter-cell">
                <label>🔍 Search: </label>
                <input type="text" id="filterInput" class="filter-input" placeholder="" value="">
                <button id="clearFilterBtn" class="clear-filter-btn">✖</button>
            </div>
            <div class="table-wrapper">
                <table class="gene-table" id="geneTable">
                    <thead id="dynamicThead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ====== RIGHT SIDEBAR: Bookmarks + DNA Library ====== -->
        <div class="right-sidebar">
            <!-- Bookmarks -->
            <div class="bookmarks-section">
                <h3>⭐ BOOKMARKS</h3>
                <div id="bookmarksList" class="bookmarks-list">
                    <div class="empty-bookmarks">No bookmarks yet.<br>Click ★ a row to add.</div>
                </div>
            </div>

            <!-- DNA Library (unchanged) -->
            <div class="saved-dna-section">
                <h3>📁 DNA Library</h3>
                <div class="library-controls">
                    <button id="addCategoryBtn"><span>➕</span> Add Category</button>
                    <button id="saveDnaBtn"><span>💾</span> <span id="saveBtnText">Save DNA</span></button>
                </div>
                <ul class="category-list" id="categoryList"></ul>
                <div class="import-export-btns">
                    <button id="exportLibBtn"><span>⬇️</span> Export</button>
                    <button id="importLibBtn"><span>⬆️</span> Import</button>
                </div>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none">
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Original scripts (unchanged) -->
    <script src="mapping.js"></script>
    <script src="crispr.js"></script>
    <script src="headers.js"></script>

    <!-- Override script – redefines functions after load -->
    <script src="simpr.js"></script>
</body>
</html>
